<div class="terminal" id="terminal">
  <div class="terminal-header">
    <span class="terminal-dot red"></span>
    <span class="terminal-dot yellow"></span>
    <span class="terminal-dot green"></span>
    <span class="terminal-title">hendrik@zurich ~ </span>
  </div>
  <div class="terminal-body" id="terminal-body">
    <div id="terminal-output"></div>
    <div class="terminal-input-line">
      <span class="terminal-prompt"><span style="color:var(--success)">hendrik@zurich</span>:<span style="color:#79c0ff">~</span>$&nbsp;</span>
      <input type="text" id="terminal-input" class="terminal-input" autocomplete="off" autofocus spellcheck="false" />
    </div>
  </div>
</div>

<style>
.terminal {
  background: #0d1117;
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 3rem;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), 0 0 40px rgba(0, 210, 255, 0.05);
  max-width: 100%;
}

.terminal-header {
  background: #161b22;
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  border-bottom: 1px solid var(--border);
}

.terminal-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
}
.terminal-dot.red { background: #ff5f56; }
.terminal-dot.yellow { background: #ffbd2e; }
.terminal-dot.green { background: #27c93f; }

.terminal-title {
  color: var(--text-dim);
  font-family: var(--font-mono);
  font-size: 0.8rem;
  margin-left: 8px;
}

.terminal-body {
  padding: 1.2rem;
  font-family: var(--font-mono);
  font-size: 0.9rem;
  line-height: 1.7;
  min-height: 180px;
  max-height: 400px;
  overflow-y: auto;
}

.terminal-output-line {
  white-space: pre-wrap;
  word-break: break-word;
}

.terminal-output-line.command {
  color: var(--text-main);
}

.terminal-output-line.response {
  color: var(--text-muted);
}

.terminal-output-line.accent {
  color: var(--accent);
}

.terminal-output-line.ascii {
  color: var(--accent);
  line-height: 1.15;
  font-size: 0.55rem;
  letter-spacing: 1px;
}

@media (max-width: 600px) {
  .terminal-output-line.ascii {
    font-size: 0.35rem;
  }
}

.terminal-input-line {
  display: flex;
  align-items: center;
  margin-top: 4px;
}

.terminal-prompt {
  color: var(--accent);
  font-family: var(--font-mono);
  font-size: 0.9rem;
  flex-shrink: 0;
}

.terminal-input {
  background: transparent;
  border: none;
  outline: none;
  color: var(--text-main);
  font-family: var(--font-mono);
  font-size: 0.9rem;
  flex: 1;
  caret-color: var(--accent);
  padding: 0;
}

.terminal-input::placeholder {
  color: var(--text-dim);
}

.typing-cursor {
  display: inline-block;
  width: 8px;
  height: 1.1em;
  background: var(--accent);
  vertical-align: text-bottom;
  animation: blink 1s step-end infinite;
  margin-left: 1px;
}

@keyframes blink {
  50% { opacity: 0; }
}
</style>

<script>
(function() {
  const output = document.getElementById('terminal-output');
  const input = document.getElementById('terminal-input');
  const body = document.getElementById('terminal-body');

  const ASCII_ART = [
    ' _   _                _      _ _    ',
    '| | | | ___ _ __   __| |_ __(_) | __',
    '| |_| |/ _ \\ \'_ \\ / _` | \'__| | |/ /',
    '|  _  |  __/ | | | (_| | |  | |   < ',
    '|_| |_|\\___|_| |_|\\__,_|_|  |_|_|\\_\\'
  ];

  // Filesystem
  var currentPath = '/home/hendrik/website';
  var FS = {
    '/home/hendrik/website': {
      type: 'dir',
      children: ['about.md', 'blog/', 'certificates/', 'cheatsheets/', 'chess/', 'impressum.md', 'datenschutz.md']
    },
    '/home/hendrik/website/blog': {
      type: 'dir', url: '/',
      children: ['effective-java.md', 'java-klassen.md', 'mapmulti.md', 'stream-gatherers.md', 'hello-world.md']
    },
    '/home/hendrik/website/certificates': { type: 'dir', url: '/certificates/' },
    '/home/hendrik/website/cheatsheets': {
      type: 'dir', url: '/cheatsheets/',
      children: ['java-streams.md', 'java-serialization.md', 'java-concurrency.md', 'angular.md', 'kubernetes.md', 'openshift.md', 'tekton.md', 'argocd.md']
    },
    '/home/hendrik/website/chess': { type: 'dir', url: '/chess/' },
  };

  function resolvePath(target) {
    if (!target || target === '~') return '/home/hendrik/website';
    var path = target.startsWith('/') ? target : currentPath + '/' + target;
    // Remove trailing slash
    path = path.replace(/\/+$/, '') || '/';
    // Resolve .. and .
    var parts = path.split('/');
    var resolved = [];
    for (var i = 0; i < parts.length; i++) {
      if (parts[i] === '..') { resolved.pop(); }
      else if (parts[i] !== '.' && parts[i] !== '') { resolved.push(parts[i]); }
    }
    return '/' + resolved.join('/');
  }

  function getPromptPath() {
    var home = '/home/hendrik/website';
    if (currentPath === home) return '~';
    if (currentPath.startsWith(home + '/')) return '~' + currentPath.slice(home.length);
    return currentPath;
  }

  function updatePrompt() {
    document.querySelector('.terminal-prompt').innerHTML = '<span style="color:var(--success)">hendrik@zurich</span>:<span style="color:#79c0ff">' + getPromptPath() + '</span>$&nbsp;';
    document.querySelector('.terminal-title').textContent = 'hendrik@zurich:' + getPromptPath();
  }

  const COMMANDS = {
    help: function() {
      return [
        { text: 'Available commands:', cls: 'accent' },
        { text: '' },
        { text: '  about       Who I am', cls: 'response' },
        { text: '  skills      Technologies I work with', cls: 'response' },
        { text: '  contact     Get in touch', cls: 'response' },
        { text: '  cd <dir>    Navigate directories', cls: 'response' },
        { text: '  ls          List directory contents', cls: 'response' },
        { text: '  pwd         Print working directory', cls: 'response' },
        { text: '  open        Open current directory in browser', cls: 'response' },
        { text: '  cat <file>  Read a file', cls: 'response' },
        { text: '  clear       Clear terminal', cls: 'response' },
        { text: '  hello       Say hi', cls: 'response' },
        { text: '' },
        { text: '  Shortcuts: blog, certs, cheatsheets, chess', cls: 'response' },
      ];
    },
    about: function() {
      return [
        { text: 'Hendrik Schick', cls: 'accent' },
        { text: 'Software Engineer & Consultant', cls: 'response' },
        { text: '' },
        { text: 'Based near Zurich, Switzerland.', cls: 'response' },
        { text: 'Fullstack & DevOps Developer at ERNI AG.', cls: 'response' },
        { text: 'Background: CS Bachelor (Leipzig), CS Master (TU Darmstadt).', cls: 'response' },
        { text: '' },
        { text: 'I build backends, frontends, and CI/CD pipelines.', cls: 'response' },
        { text: 'I write about Java and software engineering on this blog.', cls: 'response' },
      ];
    },
    skills: function() {
      return [
        { text: 'Languages    Java, TypeScript, Python, SQL', cls: 'response' },
        { text: 'Backend      Spring Boot, Jakarta EE, Quarkus', cls: 'response' },
        { text: 'Frontend     Angular, HTML/CSS', cls: 'response' },
        { text: 'DevOps       Kubernetes, OpenShift, Tekton, ArgoCD', cls: 'response' },
        { text: 'Cloud        Azure, Docker, Helm', cls: 'response' },
        { text: 'Tools        Git, Maven, Gradle, Jenkins', cls: 'response' },
        { text: 'Databases    PostgreSQL, MongoDB, Redis', cls: 'response' },
      ];
    },
    contact: function() {
      return [
        { text: 'Email:    mail@hendrik-schick.me', cls: 'accent' },
        { text: 'GitHub:   github.com/ky0n', cls: 'response' },
        { text: 'LinkedIn: linkedin.com/in/hendrik-schick', cls: 'response' },
        { text: 'BlueSky:  bsky.app/profile/hendrik-schick.me', cls: 'response' },
      ];
    },
    blog: function() {
      window.location.href = '/';
      return [{ text: 'Redirecting to blog...', cls: 'accent' }];
    },
    certs: function() {
      window.location.href = '/certificates/';
      return [{ text: 'Redirecting to certificates...', cls: 'accent' }];
    },
    cheatsheets: function() {
      window.location.href = '/cheatsheets/';
      return [{ text: 'Redirecting to cheat sheets...', cls: 'accent' }];
    },
    chess: function() {
      window.location.href = '/chess/';
      return [{ text: 'Starting chess...', cls: 'accent' }];
    },
    hello: function() {
      var greetings = [
        'Hoi! Greetings from Zurich!',
        'Hey there! Welcome to my corner of the internet.',
        'Hello, World! (A classic, I know.)',
        'Gruezi! Nice to see you here.',
        'Hi! Feel free to look around.',
      ];
      return [{ text: greetings[Math.floor(Math.random() * greetings.length)], cls: 'accent' }];
    },
    clear: function() {
      output.innerHTML = '';
      return [];
    },
    sudo: function() {
      return [{ text: 'Nice try. Permission denied.', cls: 'response' }];
    },
    ls: function(args) {
      var target = args ? resolvePath(args) : currentPath;
      var dir = FS[target];
      if (!dir) {
        return [{ text: 'ls: cannot access \'' + (args || '.') + '\': No such file or directory', cls: 'response' }];
      }
      var children = dir.children || [];
      if (children.length === 0) {
        return [{ text: '(empty directory)', cls: 'response' }];
      }
      // Color directories vs files
      var colored = children.map(function(c) {
        return c.endsWith('/') ? '\x1b[dir]' + c + '\x1b[/dir]' : c;
      });
      return [{ text: children.join('   '), cls: 'response', dirs: children }];
    },
    pwd: function() {
      return [{ text: currentPath, cls: 'response' }];
    },
    cd: function(args) {
      if (!args) args = '~';
      var target = resolvePath(args.replace(/\/$/, ''));
      if (FS[target]) {
        currentPath = target;
        updatePrompt();
        return [];
      }
      // Check if it's a file
      var parentPath = currentPath;
      var parentDir = FS[parentPath];
      if (parentDir && parentDir.children) {
        var match = parentDir.children.find(function(c) { return c === args || c === args + '/'; });
        if (match && !match.endsWith('/')) {
          return [{ text: 'cd: not a directory: ' + args, cls: 'response' }];
        }
      }
      return [{ text: 'cd: no such directory: ' + args, cls: 'response' }];
    },
    open: function() {
      var dir = FS[currentPath];
      if (dir && dir.url) {
        window.location.href = dir.url;
        return [{ text: 'Opening ' + currentPath + ' in browser...', cls: 'accent' }];
      }
      if (currentPath === '/home/hendrik/website') {
        return [{ text: 'You are at the root. Try cd into a directory first, then open.', cls: 'response' }];
      }
      return [{ text: 'No page associated with this directory.', cls: 'response' }];
    },
    cat: function(args) {
      if (!args) return [{ text: 'Usage: cat <filename>', cls: 'response' }];
      var dir = FS[currentPath];
      if (!dir || !dir.children) return [{ text: 'cat: ' + args + ': No such file', cls: 'response' }];
      var found = dir.children.find(function(c) { return c === args; });
      if (!found) return [{ text: 'cat: ' + args + ': No such file', cls: 'response' }];
      if (found.endsWith('/')) return [{ text: 'cat: ' + args + ': Is a directory', cls: 'response' }];
      // File contents
      var contents = {
        'about.md': ['# Hendrik Schick', 'Software Engineer & Consultant', 'Based near Zurich, Switzerland.', '', 'Type "about" for more info.'],
        'impressum.md': ['# Impressum', 'Hendrik Heinrich Schick', 'Kornstrasse 3, 8603 Schwerzenbach ZH', 'mail@hendrik-schick.me'],
        'datenschutz.md': ['# Datenschutzerklaerung', 'See /datenschutz/ for full privacy policy.'],
        'effective-java.md': ['# Book Review - Effective Java', 'A review of Josh Bloch\'s classic Java book.', '', 'Visit /blog/book-review-effective-java/'],
        'java-streams.md': ['# Java Streams Cheat Sheet', 'Stream operations, Collectors, Gatherers & more.', '', 'Visit /cheatsheets/java-streams/'],
        'java-serialization.md': ['# Java Serialization Cheat Sheet', 'Visit /cheatsheets/java-serialization/'],
        'java-concurrency.md': ['# Java Concurrency Cheat Sheet', 'Visit /cheatsheets/java-concurrency/'],
        'angular.md': ['# Angular Cheat Sheet', 'Signals, Zoneless, Control Flow & more.', '', 'Visit /cheatsheets/angular/'],
        'kubernetes.md': ['# Kubernetes Cheat Sheet', 'kubectl, Pods, Deployments, Services & more.', '', 'Visit /cheatsheets/kubernetes/'],
        'openshift.md': ['# OpenShift Cheat Sheet', 'oc CLI, S2I, Routes, SCCs & more.', '', 'Visit /cheatsheets/openshift/'],
        'tekton.md': ['# Tekton Cheat Sheet', 'Tasks, Pipelines, Workspaces & Triggers.', '', 'Visit /cheatsheets/tekton/'],
        'argocd.md': ['# ArgoCD Cheat Sheet', 'GitOps, Applications, Sync Waves & Hooks.', '', 'Visit /cheatsheets/argocd/'],
      };
      var lines = contents[args] || ['# ' + args, '(File content not available in terminal preview)'];
      return lines.map(function(l) { return { text: l, cls: l.startsWith('#') ? 'accent' : 'response' }; });
    },
    whoami: function() {
      return [{ text: 'visitor (but you are welcome here!)', cls: 'response' }];
    },
    date: function() {
      return [{ text: new Date().toString(), cls: 'response' }];
    },
    exit: function() {
      return [{ text: 'There is no escape. Try "help" instead.', cls: 'response' }];
    },
    andre: function() {
      var lines = [
        { text: '', cls: '' },
        { text: '  Hallo Andre!! 😎', cls: 'accent' },
        { text: '', cls: '' },
      ];
      // Schedule the animated ASCII art appearance
      setTimeout(function() {
        var artLines = [
          { text: '                    ╭──────────────────────╮', cls: 'response' },
          { text: '                    │ "Was laberscht du?" │', cls: 'accent' },
          { text: '                    ╰───────────┬──────────╯', cls: 'response' },
          { text: '          ┌──────────┐          │', cls: 'response' },
          { text: '          │ ▓▓▓▓▓▓▓▓ │         ╱', cls: 'response' },
          { text: '          │▓▓▓▓▓▓▓▓▓▓│        ╱', cls: 'response' },
          { text: '          ▓ ◉      ◉ ▓', cls: 'response' },
          { text: '          ▓    ██    ▓', cls: 'response' },
          { text: '          ▓  ╰════╯  ▓   Isch möschte nischt,', cls: 'response' },
          { text: '          ▓ ▓▓▓▓▓▓▓▓ ▓   dass hier irgendjemand', cls: 'response' },
          { text: '           ▓▓▓▓▓▓▓▓▓▓    Befehle eingibt.', cls: 'response' },
          { text: '           ║        ║', cls: 'response' },
          { text: '           ║ ANTOINE║     Das isch Reschpekt.', cls: 'response' },
          { text: '           ╚════════╝', cls: 'response' },
          { text: '', cls: '' },
        ];
        var i = 0;
        function showNextLine() {
          if (i < artLines.length) {
            addLine(artLines[i].text, artLines[i].cls);
            scrollToBottom();
            i++;
            setTimeout(showNextLine, 80);
          }
        }
        showNextLine();
      }, 200);
      return lines;
    },
    alex: function() {
      launchRocket();
      return [
        { text: '', cls: '' },
        { text: '    HALLO ALEX!! 🚀', cls: 'accent' },
        { text: '', cls: '' },
      ];
    },
    neofetch: function() {
      return [
        { text: 'hendrik@zurich', cls: 'accent' },
        { text: '─────────────────', cls: 'response' },
        { text: 'OS:      Web Browser', cls: 'response' },
        { text: 'Host:    hendrik-schick.me', cls: 'response' },
        { text: 'Uptime:  since 2024', cls: 'response' },
        { text: 'Shell:   terminal.js', cls: 'response' },
        { text: 'Theme:   Futuristic Dark', cls: 'response' },
        { text: 'Stack:   Java, Angular, K8s', cls: 'response' },
      ];
    }
  };

  function addLine(text, cls) {
    var line = document.createElement('div');
    line.className = 'terminal-output-line' + (cls ? ' ' + cls : '');
    line.textContent = text;
    output.appendChild(line);
  }

  function scrollToBottom() {
    body.scrollTop = body.scrollHeight;
  }

  function processCommand(cmd) {
    var trimmed = cmd.trim();
    addLine(getPromptPath() + '$ ' + cmd, 'command');

    if (trimmed === '') {
      scrollToBottom();
      return;
    }

    var parts = trimmed.split(/\s+/);
    var command = parts[0].toLowerCase();
    var args = parts.slice(1).join(' ');

    var handler = COMMANDS[command];
    if (handler) {
      var lines = handler(args);
      lines.forEach(function(l) { addLine(l.text, l.cls); });
    } else {
      addLine('Command not found: ' + command + '. Type "help" for available commands.', 'response');
    }
    addLine('', '');
    scrollToBottom();
  }

  // Intro animation
  function typeIntro() {
    var introLines = [];
    ASCII_ART.forEach(function(line) {
      introLines.push({ text: line, cls: 'ascii' });
    });
    introLines.push({ text: '', cls: '' });
    introLines.push({ text: 'Software Engineer & Consultant', cls: 'accent' });
    introLines.push({ text: 'Zurich, Switzerland', cls: 'response' });
    introLines.push({ text: '', cls: '' });
    introLines.push({ text: 'Type "help" to see available commands.', cls: 'response' });
    introLines.push({ text: '', cls: '' });

    var i = 0;
    function showNext() {
      if (i < introLines.length) {
        addLine(introLines[i].text, introLines[i].cls);
        scrollToBottom();
        i++;
        setTimeout(showNext, introLines[i - 1].cls === 'ascii' ? 40 : 80);
      } else {
        input.placeholder = 'Type a command...';
        input.focus();
      }
    }
    showNext();
  }

  // Input handling
  var commandHistory = [];
  var historyIndex = -1;

  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      var cmd = input.value;
      if (cmd.trim()) {
        commandHistory.unshift(cmd);
      }
      historyIndex = -1;
      processCommand(cmd);
      input.value = '';
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (historyIndex < commandHistory.length - 1) {
        historyIndex++;
        input.value = commandHistory[historyIndex];
      }
    } else if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (historyIndex > 0) {
        historyIndex--;
        input.value = commandHistory[historyIndex];
      } else {
        historyIndex = -1;
        input.value = '';
      }
    } else if (e.key === 'Tab') {
      e.preventDefault();
      var val = input.value;
      var parts = val.split(/\s+/);
      if (parts.length <= 1) {
        // Complete command names
        var partial = parts[0].toLowerCase();
        var cmds = Object.keys(COMMANDS);
        var matches = cmds.filter(function(c) { return c.startsWith(partial); });
        if (matches.length === 1) { input.value = matches[0] + ' '; }
        else if (matches.length > 1) {
          addLine(getPromptPath() + '$ ' + val, 'command');
          addLine(matches.join('  '), 'response');
          addLine('', '');
          scrollToBottom();
        }
      } else {
        // Complete file/directory names
        var partial = parts[parts.length - 1];
        var dir = FS[currentPath];
        if (dir && dir.children) {
          var matches = dir.children.filter(function(c) {
            return c.toLowerCase().startsWith(partial.toLowerCase());
          });
          if (matches.length === 1) {
            parts[parts.length - 1] = matches[0];
            input.value = parts.join(' ');
          } else if (matches.length > 1) {
            addLine(getPromptPath() + '$ ' + val, 'command');
            addLine(matches.join('  '), 'response');
            addLine('', '');
            scrollToBottom();
          }
        }
      }
    }
  });

  // Click anywhere in terminal to focus input
  document.getElementById('terminal').addEventListener('click', function() {
    input.focus();
  });

  function launchRocket() {
    var rocket = document.createElement('div');
    rocket.className = 'easter-rocket';
    rocket.innerHTML = '<div class="rocket-body">' +
      '<div class="rocket-tip"></div>' +
      '<div class="rocket-hull"></div>' +
      '<div class="rocket-window"></div>' +
      '<div class="rocket-fin rocket-fin-l"></div>' +
      '<div class="rocket-fin rocket-fin-r"></div>' +
      '<div class="rocket-flame"></div>' +
      '<div class="rocket-flame flame-2"></div>' +
      '<div class="rocket-smoke smoke-1"></div>' +
      '<div class="rocket-smoke smoke-2"></div>' +
      '<div class="rocket-smoke smoke-3"></div>' +
      '</div>';
    document.body.appendChild(rocket);
    setTimeout(function() { rocket.classList.add('launch'); }, 50);
    setTimeout(function() { rocket.remove(); }, 4000);
  }

  typeIntro();
})();
</script>

<style>
.easter-rocket {
  position: fixed;
  bottom: -200px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 9999;
  pointer-events: none;
  transition: none;
}
.easter-rocket.launch {
  animation: rocket-launch 3.5s cubic-bezier(0.2, 0.8, 0.3, 1) forwards;
}
.rocket-body {
  position: relative;
  width: 60px;
  height: 180px;
}
.rocket-tip {
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 0;
  height: 0;
  border-left: 18px solid transparent;
  border-right: 18px solid transparent;
  border-bottom: 40px solid #e74c3c;
}
.rocket-hull {
  position: absolute;
  top: 38px;
  left: 50%;
  transform: translateX(-50%);
  width: 36px;
  height: 80px;
  background: linear-gradient(90deg, #bdc3c7, #ecf0f1, #bdc3c7);
  border-radius: 0 0 8px 8px;
}
.rocket-window {
  position: absolute;
  top: 55px;
  left: 50%;
  transform: translateX(-50%);
  width: 16px;
  height: 16px;
  background: radial-gradient(circle, #74b9ff, #0984e3);
  border-radius: 50%;
  border: 2px solid #636e72;
  box-shadow: 0 0 10px rgba(116, 185, 255, 0.5);
}
.rocket-fin {
  position: absolute;
  top: 95px;
  width: 0;
  height: 0;
}
.rocket-fin-l {
  left: 2px;
  border-top: 15px solid transparent;
  border-right: 14px solid #e74c3c;
  border-bottom: 15px solid transparent;
  transform: rotate(15deg);
}
.rocket-fin-r {
  right: 2px;
  border-top: 15px solid transparent;
  border-left: 14px solid #e74c3c;
  border-bottom: 15px solid transparent;
  transform: rotate(-15deg);
}
.rocket-flame {
  position: absolute;
  bottom: -30px;
  left: 50%;
  transform: translateX(-50%);
