<canvas id="starfield" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;pointer-events:none;"></canvas>
<script>
(function() {
  var canvas = document.getElementById('starfield');
  var ctx = canvas.getContext('2d');
  var stars = [];
  var shootingStars = [];
  var w, h;
  var STAR_COUNT = 200;
  var lastShoot = 0;

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }

  function initStars() {
    stars = [];
    for (var i = 0; i < STAR_COUNT; i++) {
      stars.push({
        x: Math.random() * w,
        y: Math.random() * h,
        r: Math.random() * 1.5 + 0.3,
        speed: Math.random() * 0.15 + 0.02,
        opacity: Math.random() * 0.7 + 0.3,
        twinkleSpeed: Math.random() * 0.02 + 0.005,
        twinklePhase: Math.random() * Math.PI * 2,
        // Some stars have slight color
        hue: Math.random() > 0.85 ? (Math.random() > 0.5 ? 195 : 260) : 0,
        sat: Math.random() > 0.85 ? 80 : 0
      });
    }
  }

  function spawnShootingStar() {
    shootingStars.push({
      x: Math.random() * w * 0.8,
      y: Math.random() * h * 0.4,
      len: Math.random() * 80 + 40,
      speed: Math.random() * 8 + 6,
      angle: Math.PI / 4 + (Math.random() - 0.5) * 0.3,
      opacity: 1,
      life: 0
    });
  }

  var t = 0;
  function draw() {
    ctx.clearRect(0, 0, w, h);
    t++;

    // Nebula glow (very subtle)
    var grd1 = ctx.createRadialGradient(w * 0.2, h * 0.3, 0, w * 0.2, h * 0.3, w * 0.5);
    grd1.addColorStop(0, 'rgba(0, 210, 255, 0.015)');
    grd1.addColorStop(1, 'transparent');
    ctx.fillStyle = grd1;
    ctx.fillRect(0, 0, w, h);

    var grd2 = ctx.createRadialGradient(w * 0.8, h * 0.7, 0, w * 0.8, h * 0.7, w * 0.4);
    grd2.addColorStop(0, 'rgba(138, 43, 226, 0.01)');
    grd2.addColorStop(1, 'transparent');
    ctx.fillStyle = grd2;
    ctx.fillRect(0, 0, w, h);

    // Stars
    for (var i = 0; i < stars.length; i++) {
      var s = stars[i];
      var twinkle = Math.sin(t * s.twinkleSpeed + s.twinklePhase);
      var opacity = s.opacity * (0.6 + 0.4 * twinkle);

      if (s.sat > 0) {
        ctx.fillStyle = 'hsla(' + s.hue + ', ' + s.sat + '%, 80%, ' + opacity + ')';
      } else {
        ctx.fillStyle = 'rgba(240, 246, 252, ' + opacity + ')';
      }

      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();

      // Glow for brighter stars
      if (s.r > 1.2) {
        ctx.fillStyle = 'rgba(200, 230, 255, ' + (opacity * 0.15) + ')';
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r * 3, 0, Math.PI * 2);
        ctx.fill();
      }

      // Drift upward slowly
      s.y -= s.speed;
      if (s.y < -5) {
        s.y = h + 5;
        s.x = Math.random() * w;
      }
    }

    // Shooting stars
    if (t - lastShoot > 400 + Math.random() * 600) {
      spawnShootingStar();
      lastShoot = t;
    }

    for (var j = shootingStars.length - 1; j >= 0; j--) {
      var ss = shootingStars[j];
      ss.life++;
      ss.x += Math.cos(ss.angle) * ss.speed;
      ss.y += Math.sin(ss.angle) * ss.speed;
      ss.opacity = Math.max(0, 1 - ss.life / 40);

      if (ss.opacity <= 0) {
        shootingStars.splice(j, 1);
        continue;
      }

      var tailX = ss.x - Math.cos(ss.angle) * ss.len;
      var tailY = ss.y - Math.sin(ss.angle) * ss.len;
      var gradient = ctx.createLinearGradient(tailX, tailY, ss.x, ss.y);
      gradient.addColorStop(0, 'rgba(255, 255, 255, 0)');
      gradient.addColorStop(1, 'rgba(200, 230, 255, ' + (ss.opacity * 0.8) + ')');

      ctx.strokeStyle = gradient;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(tailX, tailY);
      ctx.lineTo(ss.x, ss.y);
      ctx.stroke();

      // Head glow
      ctx.fillStyle = 'rgba(255, 255, 255, ' + ss.opacity + ')';
      ctx.beginPath();
      ctx.arc(ss.x, ss.y, 1.5, 0, Math.PI * 2);
      ctx.fill();
    }

    requestAnimationFrame(draw);
  }

  resize();
  initStars();
  draw();

  window.addEventListener('resize', function() {
    resize();
    initStars();
  });
})();
</script>
